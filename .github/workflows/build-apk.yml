name: Build Android APK

# Trigger on every push to main/master and via manual dispatch
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. System dependencies ───────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev \
            libffi-dev libssl-dev cmake \
            build-essential ccache \
            libltdl-dev python3-dev lld
          # Export JAVA_HOME so Android build tools can find Java
          echo "JAVA_HOME=$(readlink -f /usr/bin/java | sed 's|/bin/java||')" >> $GITHUB_ENV

      # ── 4. Cache buildozer + Android SDK/NDK ─────────────────────────────
      #    First build: ~30-45 min (downloads Android SDK, NDK, p4a recipes)
      #    Subsequent builds: ~5-10 min (everything cached)
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          # No restore-keys: stale caches from different arch configs cause broken builds.
          # Only an exact match is used; everything else starts fresh.
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}-v5

      # ── 5. Install Buildozer ──────────────────────────────────────────────
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      # ── 6. Build the debug APK ────────────────────────────────────────────
      - name: Build APK (debug)
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      # ── 7. Upload the APK as a downloadable artifact ──────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: btcalc-debug-apk
          # APK lands in bin/ after a successful buildozer run
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      # ── 8. Always upload build log so crashes can be diagnosed ───────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
